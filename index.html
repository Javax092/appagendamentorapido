    <meta
      name="twitter:title"
      content="O Pai Ta On | Agenda premium para barbearia"
    />
    <meta
      name="twitter:description"
      content="PWA de agendamento para barbearia com visual premium, operacao mobile e CRM."
    />
    <meta
      name="twitter:image"
      content="https://appmobilebarbearia.vercel.app/paitaon.png"
    />

    <!-- ALTERACAO: canonical, app icons e instalacao mobile. -->
    <link rel="canonical" href="https://appmobilebarbearia.vercel.app/" />
    <link rel="icon" type="image/svg+xml" href="//ambiente.jpeg" />
    <link rel="manifest" href="/manifest.webmanifest" />

    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="O Pai Ta On" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <link rel="apple-touch-icon" sizes="180x180" href="/paitaon.png" />
    <link
      rel="apple-touch-startup-image"
      href="/ash.jpeg"
      media="(device-width: 430px) and (device-height: 932px) and (-webkit-device-pixel-ratio: 3)"
    />
    <link
      rel="apple-touch-startup-image"
      href="/degrade.jpeg"
      media="(device-width: 428px) and (device-height: 926px) and (-webkit-device-pixel-ratio: 3)"
    />
    <link
      rel="apple-touch-startup-image"
      href="/moicano.jpeg"
      media="(device-width: 393px) and (device-height: 852px) and (-webkit-device-pixel-ratio: 3)"
    />
    <link
      rel="apple-touch-startup-image"
      href="/barba.jpeg"
      media="(device-width: 390px) and (device-height: 844px) and (-webkit-device-pixel-ratio: 3)"
    />

    <meta name="msapplication-TileColor" content="#120D09" />
    <meta name="msapplication-TileImage" content="/ambiente.jpeg" />

    <!-- ALTERACAO: preconnect, dns-prefetch e preload dos recursos criticos. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="dns-prefetch" href="https://fonts.googleapis.com" />
    <link rel="dns-prefetch" href="https://fonts.gstatic.com" />
    <link rel="dns-prefetch" href="https://vgchgcvfyxwyqccvliep.supabase.co" />

    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
    />

    <script>
      // ALTERACAO: tema inline para evitar flash de tema incorreto antes do React hidratar.
      (() => {
        const storageKey = "appmobilebarbearia.theme-mode";
        const root = document.documentElement;
        const systemPrefersLight = window.matchMedia(
          "(prefers-color-scheme: light)",
        ).matches;
        const stored = localStorage.getItem(storageKey);
        const theme = stored || (systemPrefersLight ? "light" : "dark");
        root.dataset.theme = theme;
        root.style.colorScheme = theme;
        root.style.backgroundColor = theme === "light" ? "#F6EFE7" : "#120D09";
      })();
    </script>

    <script type="application/ld+json">
      <!-- ALTERACAO: structured data LocalBusiness / BarberShop para descoberta local. -->
      {
        "@context": "https://schema.org",
        "@type": "BarberShop",
        "name": "O Pai Ta On",
        "url": "https://appmobilebarbearia.vercel.app/",
        "image": "https://appmobilebarbearia.vercel.app/paitaon.png",
        "telephone": "+55 92 8620-2729",
        "priceRange": "$$",
        "description": "Barbearia premium com agendamento online, painel operacional e CRM mobile-first.",
        "openingHoursSpecification": [
          {
            "@type": "OpeningHoursSpecification",
            "dayOfWeek": [
              "Monday",
              "Tuesday",
              "Wednesday",
              "Thursday",
              "Friday",
              "Saturday"
            ],
            "opens": "09:00",
            "closes": "21:00"
          }
        ]
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <noscript>
      <!-- ALTERACAO: fallback elegante para navegadores sem JavaScript. -->
      <section
        style="
          min-height: 100vh;
          display: grid;
          place-items: center;
          padding: 32px;
          background:
            radial-gradient(
              circle at top,
              rgba(198, 145, 55, 0.16),
              transparent 36%
            ),
            #120d09;
          color: #f6efe7;
          font-family: &quot;Plus Jakarta Sans&quot;, system-ui, sans-serif;
        "
      >
        <div
          style="
            max-width: 28rem;
            border: 1px solid rgba(255, 231, 198, 0.14);
            border-radius: 28px;
            padding: 28px;
            background: rgba(28, 20, 14, 0.88);
            box-shadow: 0 24px 72px rgba(0, 0, 0, 0.35);
          "
        >
          <p
            style="
              margin: 0 0 8px;
              letter-spacing: 0.18em;
              text-transform: uppercase;
              color: #c69137;
              font-size: 0.75rem;
            "
          >
            Experiencia Premium
          </p>
          <h1
            style="
              margin: 0 0 12px;
              font-family: &quot;Cormorant Garamond&quot;, serif;
              font-size: 2.5rem;
              line-height: 0.95;
            "
          >
            Ative o JavaScript para abrir o O Pai Ta On.
          </h1>
          <p
            style="
              margin: 0;
              color: rgba(246, 239, 231, 0.76);
              line-height: 1.7;
            "
          >
            O app usa recursos de PWA, agenda em tempo real e integracao com
            Supabase para carregar horarios, servicos e operacao do barbeiro.
          </p>
        </div>
      </section>
    </noscript>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
